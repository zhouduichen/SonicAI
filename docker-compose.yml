version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sonicai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sonicai-backend
    ports:
      - "8000:8000"
    environment:
      - SONICAI_HARDWARE_TIER=${SONICAI_HARDWARE_TIER:-mid}
      - SONICAI_PREFERENCE=${SONICAI_PREFERENCE:-speed}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/aimusic.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me-in-production}
      - UPLOAD_DIR=/app/data/uploads
      - GENERATED_DIR=/app/data/generated
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HUB_ENABLE_HTTP_BACKTRACE=1
    volumes:
      - backend_data:/app/data
      - model_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    container_name: sonicai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  backend_data:
  model_cache:
